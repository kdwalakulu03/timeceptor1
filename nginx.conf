# Nginx reverse proxy config for Timeceptor on Debian 12 VM
# Place at: /etc/nginx/sites-available/timeceptor
# Then: sudo ln -s /etc/nginx/sites-available/timeceptor /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name timeceptor.com www.timeceptor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name timeceptor.com www.timeceptor.com;

    # --- SSL (Let's Encrypt via certbot) ---
    # Run: sudo certbot --nginx -d timeceptor.com -d www.timeceptor.com
    ssl_certificate     /etc/letsencrypt/live/timeceptor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timeceptor.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self)" always;

    # --- Proxy to Node/Express app ---
    location / {
        proxy_pass         http://127.0.0.1:47000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
