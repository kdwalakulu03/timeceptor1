<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Horoscope - AI Powered Astrology</title>
    <style>
      /* Cosmic Loading Screen Styles */
      :root {
        --color-void: #030303;
        --color-starlight: #FAFAFA;
        --color-gold-muted: #C1A661;
        --color-gold-dim: rgba(193, 166, 97, 0.2);
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--color-void);
        color: var(--color-starlight);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      
      /* Preloader container */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--color-void);
        z-index: 9999;
        transition: opacity 0.8s ease-out, visibility 0.8s;
      }
      
      /* Animated background with nebula effect */
      .nebula {
        position: absolute;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 20% 30%, var(--color-gold-dim) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, var(--color-gold-dim) 0%, transparent 50%),
          radial-gradient(circle at 40% 80%, var(--color-gold-dim) 0%, transparent 50%);
        opacity: 0.3;
        animation: nebulaPulse 8s ease-in-out infinite alternate;
      }
      
      @keyframes nebulaPulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.05); }
      }
      
      /* Shooting stars container */
      .shooting-stars {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      
      .shooting-star {
        position: absolute;
        width: 100px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--color-starlight));
        border-radius: 2px;
        transform: rotate(var(--rotation));
        opacity: 0;
        animation: shoot var(--duration) ease-out infinite;
      }
      
      @keyframes shoot {
        0% { opacity: 0; transform: translateX(-50px) rotate(var(--rotation)); }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateX(calc(100vw + 50px)) rotate(var(--rotation)); }
      }
      
      /* Twinkling stars */
      .star {
        position: absolute;
        background-color: var(--color-starlight);
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }
      
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      
      /* Central logo/text */
      .logo-container {
        position: relative;
        text-align: center;
        z-index: 10;
        margin-bottom: 2rem;
      }
      
      .logo h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem;
        font-weight: 700;
        margin: 0;
        color: var(--color-starlight);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: linear-gradient(45deg, var(--color-starlight) 0%, var(--color-gold-muted) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: logoFloat 3s ease-in-out infinite;
      }
      
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .logo p {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.875rem;
        letter-spacing: 0.2em;
        color: var(--color-gold-muted);
        margin-top: 0.5rem;
        opacity: 0;
        animation: fadeIn 2s ease-out 0.5s forwards;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      /* Circular progress indicator */
      .progress-container {
        position: relative;
        width: 80px;
        height: 80px;
        z-index: 10;
      }
      
      .progress-circle {
        transform: rotate(-90deg);
        width: 100%;
        height: 100%;
      }
      
      .progress-circle circle {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
        background-color: transparent;
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
        animation: progressSpin 2s linear forwards;
      }
      
      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        color: var(--color-gold-muted);
        letter-spacing: 0.1em;
      }
      
      @keyframes progressSpin {
        to { stroke-dashoffset: 0; }
      }
      
      /* Floating particles */
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background-color: var(--color-starlight);
        border-radius: 50%;
        opacity: 0.6;
        animation: float var(--duration) ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(180deg); }
      }
      
      /* Fade out class */
      .hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="nebula"></div>
      
      <!-- Shooting stars -->
      <div class="shooting-stars" id="shootingStars"></div>
      
      <!-- Twinkling stars -->
      <script>
        const starCount = 60;
        const preloader = document.getElementById('preloader');
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 2 + 0.5;
          star.style.width = size + 'px';
          star.style.height = size + 'px';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          star.style.animationDuration = (Math.random() * 3 + 2) + 's';
          preloader.appendChild(star);
        }
        
        // Shooting stars
        const shootingContainer = document.getElementById('shootingStars');
        const shootingStars = 5;
        for (let i = 0; i < shootingStars; i++) {
          const star = document.createElement('div');
          star.className = 'shooting-star';
          const rotation = Math.random() * 60 - 30; // -30 to 30 degrees
          star.style.setProperty('--rotation', `${rotation}deg`);
          star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          shootingContainer.appendChild(star);
        }
        
        // Floating particles
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.setProperty('--duration', `${Math.random() * 4 + 2}s`);
          preloader.appendChild(particle);
        }
      </script>
      
      <div class="logo-container">
        <h1>cosmic</h1>
        <p>AI Powered Astrology</p>
      </div>
      
      <div class="progress-container">
        <svg class="progress-circle" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="40" stroke="var(--color-gold-muted)" fill="transparent" />
          <circle cx="50" cy="50" r="40" stroke="var(--color-starlight)" fill="transparent" stroke-dasharray="220" stroke-dashoffset="220" />
        </svg>
        <div class="progress-text">LOADING</div>
      </div>
    </div>
    
    <!-- Main App Mount Point -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Hide preloader when React app renders
      const root = document.getElementById('root');
      if (root) {
        const observer = new MutationObserver(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => {
              preloader.style.display = 'none';
            }, 800);
          }
          observer.disconnect();
        });
        observer.observe(root, { childList: true, subtree: true });
      }
    </script>
  </body>
</html>
